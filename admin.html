<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Painel Nana Moda Íntima</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="admin-body">
    <div class="admin-shell">
      <aside class="admin-sidebar">
        <a class="brand" href="index.html">
          <img class="brand-logo" src="assets/nana-logo.png" alt="Nana Moda Íntima">
        </a>
        <nav aria-label="Seções do painel">
          <button class="is-active" data-admin-tab="orders">Pedidos</button>
          <button data-admin-tab="leads">Leads</button>
          <button data-admin-tab="products">Produtos</button>
        </nav>
      </aside>
      <main class="admin-main">
        <section id="login-section" class="admin-card">
          <h1>Acesso da equipe</h1>
          <p>Entre com o usuário criado no Supabase Auth para acompanhar leads, pedidos e produtos.</p>
          <form id="login-form" class="order-form">
            <label>Email<input type="email" name="email" autocomplete="email" required></label>
            <label>Senha<input type="password" name="password" autocomplete="current-password" required></label>
            <button class="primary-button" type="submit">Entrar</button>
            <p class="form-status" id="login-status"></p>
          </form>
        </section>

        <section id="admin-section" class="hidden">
          <div class="admin-toolbar">
            <div>
              <p class="eyebrow">Painel</p>
              <h1 id="admin-title">Pedidos</h1>
            </div>
            <button class="secondary-button" id="logout-button">Sair</button>
          </div>

          <div id="orders-tab" class="admin-tab">
            <table class="data-table">
              <thead><tr><th>Cliente</th><th>Tipo</th><th>Total</th><th>Status</th><th>Data</th></tr></thead>
              <tbody id="orders-table"></tbody>
            </table>
          </div>

          <div id="leads-tab" class="admin-tab hidden">
            <table class="data-table">
              <thead><tr><th>Nome</th><th>WhatsApp</th><th>Interesse</th><th>Status</th><th>Data</th></tr></thead>
              <tbody id="leads-table"></tbody>
            </table>
          </div>

          <div id="products-tab" class="admin-tab hidden">
            <div class="product-toolbar">
              <button class="primary-button" type="button" id="open-product-modal">Cadastrar produto</button>
            </div>
            <div class="admin-grid products-list-grid">
              <table class="data-table">
                <thead><tr><th>Foto</th><th>Produto</th><th>Categoria</th><th>Preço</th><th>Ativo</th><th>Ações</th></tr></thead>
                <tbody id="products-table"></tbody>
              </table>
            </div>
            <p class="form-status" id="product-status"></p>
          </div>
        </section>
      </main>
    </div>

    <div class="product-modal" id="product-modal" aria-hidden="true">
      <div class="modal-backdrop" data-close-product-modal></div>
      <form id="product-form" class="product-modal-content order-form" role="dialog" aria-modal="true" aria-labelledby="product-form-title">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Produto</p>
            <h2 id="product-form-title">Novo produto</h2>
          </div>
          <button class="icon-button" type="button" data-close-product-modal aria-label="Fechar cadastro de produto">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </button>
        </div>
        <input type="hidden" name="id">
        <div class="product-media-preview" id="product-media-preview"></div>
        <div class="product-form-grid">
          <label>Nome<input name="name" required></label>
          <label>Slug<input name="slug" placeholder="Gerado automaticamente se ficar vazio"></label>
          <label>SKU<input name="sku"></label>
          <label class="wide-field category-picker-field">
            <span>Categorias</span>
            <select name="category_id" id="product-category" multiple></select>
            <div class="category-picker" id="category-picker">
              <button class="category-picker-control" type="button" id="category-picker-toggle" aria-expanded="false">
                <span class="category-picker-tags" id="category-picker-tags"></span>
                <span class="category-picker-chevron">⌄</span>
              </button>
              <div class="category-picker-menu" id="category-picker-menu" hidden></div>
            </div>
          </label>
          <label>Preço<input name="price" type="number" step="0.01" required></label>
          <label>Tamanhos<input name="sizes" placeholder="P, M, G, GG"></label>
          <label class="wide-field">Fotos do produto
            <input name="image_files" type="file" accept="image/*" multiple>
            <span class="field-help">Use até 5 imagens verticais em 4:5, recomendado 1080 x 1350 px, até 1 MB por imagem.</span>
          </label>
          <label class="wide-field">URLs das imagens<textarea name="image_urls" rows="3" placeholder="Opcional. Uma imagem por linha."></textarea></label>
          <label class="wide-field">Vídeo vertical<input name="video_url" placeholder="Cole aqui o link do YouTube ou Google Drive"></label>
          <label class="wide-field">Descrição<textarea name="description" rows="3"></textarea></label>
          <label class="checkbox-label"><input name="featured" type="checkbox"> Produto em destaque</label>
          <label class="checkbox-label"><input name="active" type="checkbox" checked> Produto ativo no catálogo</label>
        </div>
        <div class="form-actions">
          <button class="primary-button" type="submit" id="product-submit">Salvar produto</button>
          <button class="secondary-button" type="button" id="cancel-product-edit">Cancelar</button>
        </div>
      </form>
    </div>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js?v=20260524-7"></script>
  </body>
</html>
